name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt-check:
    name: nix fmt (lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix (flakes enabled)
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: nix fmt check
        run: |
          nix fmt
          git diff --exit-code

  flake-check:
    name: nix flake check (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        # ubuntu → checks.x86_64-linux ; macos-14 (arm64) → checks.aarch64-darwin.
        # Both instantiate the same aarch64-linux guest variants (eval only — no closure build,
        # so no linux-builder / KVM needed). Drop macos-14 if you don't need the darwin path.
        os: [ubuntu-latest, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix (flakes enabled)
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: nix flake check
        run: nix flake check --print-build-logs
